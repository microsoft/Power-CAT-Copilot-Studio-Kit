<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Studio Kit — Enterprise-Grade Agent Governance</title>
  <meta name="description" content="Open-source toolkit for testing, governing, and scaling Copilot Studio agents.">
  <style>body{margin:0;font-family:'Segoe UI Variable','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif}</style>
  <script type="module" crossorigin src="./assets/index-DfDQi7bz.js"></script>

  <!-- BotFramework WebChat SDK -->
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <style>
    /* Floating webchat widget */
    #csk-chat-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6B2FA0, #A855F7);
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(107, 47, 160, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #csk-chat-toggle:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 28px rgba(107, 47, 160, 0.5);
    }
    #csk-chat-toggle:focus-visible {
      outline: 2px solid #A855F7;
      outline-offset: 3px;
    }
    #csk-chat-toggle svg {
      width: 26px;
      height: 26px;
      fill: #fff;
    }

    #csk-chat-popup {
      display: none;
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 400px;
      height: 560px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 18px 40px -5px rgba(0, 0, 0, 0.2), 0 15px 20px -5px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      z-index: 1001;
      opacity: 0;
      transform: scale(0.95) translateY(8px);
      transform-origin: bottom right;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #csk-chat-popup.visible {
      display: block;
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    #csk-chat-header {
      background: linear-gradient(135deg, #6B2FA0, #8B5CF6);
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
    }
    #csk-chat-header .title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
    }
    #csk-chat-header .title svg { width: 20px; height: 20px; fill: #fff; }
    .chat-header-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: background 0.15s;
    }
    .chat-header-btn:hover { background: rgba(255,255,255,0.15); }
    .chat-header-btn:focus-visible { outline: 2px solid rgba(255,255,255,0.6); outline-offset: 2px; }
    .chat-header-btn svg { width: 18px; height: 18px; fill: #fff; }

    #csk-webchat {
      height: calc(100% - 50px);
      background: #f9fafb;
    }

    @media (max-width: 480px) {
      #csk-chat-popup {
        width: calc(100vw - 16px);
        height: calc(100vh - 100px);
        right: 8px;
        bottom: 80px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Floating chat widget -->
  <button id="csk-chat-toggle" aria-label="Ask the Kit — open chat assistant" title="Ask the Kit">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.03 2 10.94c0 2.78 1.56 5.27 4 6.87V22l3.54-1.95c.79.14 1.61.2 2.46.2 5.52 0 10-4.03 10-8.94S17.52 2 12 2zm1 13h-2v-2h2v2zm0-4h-2V6h2v5z"/></svg>
  </button>

  <div id="csk-chat-popup" role="dialog" aria-label="Chat with the Copilot Studio Kit assistant">
    <div id="csk-chat-header">
      <span class="title">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.03 2 10.94c0 2.78 1.56 5.27 4 6.87V22l3.54-1.95c.79.14 1.61.2 2.46.2 5.52 0 10-4.03 10-8.94S17.52 2 12 2z"/></svg>
        Ask the Kit
      </span>
      <div style="display:flex;gap:4px;">
        <button class="chat-header-btn" onclick="cskChat.restart()" aria-label="Restart conversation" title="New conversation">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <button class="chat-header-btn" onclick="cskChat.close()" aria-label="Close chat" title="Close">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>
    <div id="csk-webchat"></div>
  </div>

  <script>
    // =============================================================
    // CSK "Ask the Kit" Webchat — Direct Line Token Auth
    // =============================================================
    // REPLACE this with your actual token endpoint from:
    // Copilot Studio → Channels → Custom website → Token endpoint
    const CSK_TOKEN_ENDPOINT = "YOUR_TOKEN_ENDPOINT_HERE";

    const CSK_STYLE_OPTIONS = {
      accent: '#6B2FA0',
      backgroundColor: '#f9fafb',
      botAvatarBackgroundColor: '#6B2FA0',
      botAvatarInitials: 'CSK',
      bubbleBackground: '#f3f0f7',
      bubbleBorderColor: '#e9e5f0',
      bubbleBorderRadius: 12,
      bubbleFromUserBackground: '#eef2ff',
      bubbleFromUserBorderColor: '#e0e7ff',
      bubbleFromUserBorderRadius: 12,
      bubbleFromUserTextColor: '#1e1b4b',
      bubbleTextColor: '#1e1b4b',
      hideUploadButton: true,
      sendBoxBackground: '#f9fafb',
      sendBoxBorderTop: 'solid 1px #e5e7eb',
      sendBoxButtonColor: '#6B2FA0',
      sendBoxPlaceholderColor: '#9ca3af',
      suggestedActionBackgroundColor: '#6B2FA0',
      suggestedActionBorderRadius: 8,
      suggestedActionTextColor: '#fff',
      primaryFont: "'Segoe UI Variable', 'Segoe UI', sans-serif",
    };

    const cskChat = {
      directLineUrl: null,
      isOpen: false,
      initialized: false,

      toggle() {
        this.isOpen ? this.close() : this.open();
      },

      open() {
        const popup = document.getElementById('csk-chat-popup');
        document.getElementById('csk-chat-toggle').style.display = 'none';
        popup.classList.add('visible');
        this.isOpen = true;
        if (!this.initialized) this.init();
      },

      close() {
        document.getElementById('csk-chat-popup').classList.remove('visible');
        document.getElementById('csk-chat-toggle').style.display = 'flex';
        this.isOpen = false;
      },

      createStore() {
        return window.WebChat.createStore({}, ({ dispatch }) => (next) => (action) => {
          if (action.type === 'DIRECT_LINE/CONNECT_FULFILLED') {
            dispatch({
              type: 'DIRECT_LINE/POST_ACTIVITY',
              meta: { method: 'keyboard' },
              payload: {
                activity: {
                  channelData: { postBack: true },
                  name: 'startConversation',
                  type: 'event',
                },
              },
            });
          }
          return next(action);
        });
      },

      async renderChat(container) {
        const envEndpoint = CSK_TOKEN_ENDPOINT.slice(0, CSK_TOKEN_ENDPOINT.indexOf('/powervirtualagents'));
        const apiVersion = CSK_TOKEN_ENDPOINT.slice(CSK_TOKEN_ENDPOINT.indexOf('api-version')).split('=')[1];
        const regionalUrl = `${envEndpoint}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`;

        if (!this.directLineUrl) {
          const regionalResp = await fetch(regionalUrl);
          const regionalData = await regionalResp.json();
          this.directLineUrl = regionalData.channelUrlsById.directline;
        }

        const tokenResp = await fetch(CSK_TOKEN_ENDPOINT);
        const tokenData = await tokenResp.json();

        const directLine = window.WebChat.createDirectLine({
          domain: `${this.directLineUrl}v3/directline`,
          token: tokenData.token,
        });

        window.WebChat.renderWebChat(
          { directLine, store: this.createStore(), styleOptions: CSK_STYLE_OPTIONS },
          container
        );
      },

      async init() {
        const el = document.getElementById('csk-webchat');
        if (CSK_TOKEN_ENDPOINT === "YOUR_TOKEN_ENDPOINT_HERE") {
          el.innerHTML =
            '<div style="padding:24px;text-align:center;color:#666;font-family:Segoe UI,sans-serif;">' +
            '<p style="font-size:14px;">Agent not configured yet.</p>' +
            '<p style="font-size:12px;color:#999;">Set <code>CSK_TOKEN_ENDPOINT</code> in index.html</p></div>';
          this.initialized = true;
          return;
        }
        try {
          await this.renderChat(el);
          this.initialized = true;
        } catch (err) {
          console.error('CSK Chat init failed:', err);
          el.innerHTML =
            '<div style="padding:24px;text-align:center;color:#666;font-family:Segoe UI,sans-serif;">' +
            '<p style="font-size:14px;">Unable to connect to the assistant.</p>' +
            '<p style="font-size:12px;color:#999;">Please try again later.</p></div>';
        }
      },

      async restart() {
        if (!this.directLineUrl && CSK_TOKEN_ENDPOINT === "YOUR_TOKEN_ENDPOINT_HERE") return;
        try {
          const el = document.getElementById('csk-webchat');
          el.innerHTML = '';
          await this.renderChat(el);
        } catch (err) {
          console.error('CSK Chat restart failed:', err);
        }
      },
    };

    document.getElementById('csk-chat-toggle').addEventListener('click', () => cskChat.toggle());
  </script>
</body>
</html>
